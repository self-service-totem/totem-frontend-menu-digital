name: Deploy Frontend

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Branch to deploy"
        required: true
        type: choice
        options:
          - main
          - dev
          - prototype

      release_version:
        description: "Release version. Example: v1.0.0"
        required: true
        type: string

      target:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod

      ticket:
        description: "Ticket (required for prod)"
        required: false
        type: string


jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    environment: ${{ inputs.target }}

    steps:
      - name: Validate inputs
        run: |
          if [ "${{ inputs.target }}" = "prod" ] && [ -z "${{ inputs.ticket }}" ]; then
            echo "Ticket is required for production deploy."
            exit 1
          fi

          if [ "${{ inputs.target }}" = "prod" ] && [ "${{ inputs.source_branch }}" != "main" ]; then
            echo "Production deployments must come from main."
            exit 1
          fi

      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_branch }}
          fetch-depth: 0

      - name: Validate tag does not exist
        run: |
          if git rev-parse "${{ inputs.release_version }}" >/dev/null 2>&1; then
            echo "Tag already exists: ${{ inputs.release_version }}"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ vars.S3_BUCKET }} --delete

      - name: Invalidate CloudFront
        if: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Create and push tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "${{ inputs.release_version }}"
          git push origin "${{ inputs.release_version }}"