name: Redeploy from Tag
run-name: Redeploy · ${{ inputs.tag }} → ${{ inputs.target }} · @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to deploy (e.g. v1.2.3)"
        required: true
        type: string

      target:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
          - demo

jobs:
  redeploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    environment: ${{ inputs.target }}

    steps:
      - name: Validate tag exists
        run: |
          git ls-remote --tags https://github.com/${{ github.repository }}.git \
            "refs/tags/${{ inputs.tag }}" | grep -q . \
            || { echo "Tag not found: ${{ inputs.tag }}"; exit 1; }

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Validate prod deploys only from signed tags on main lineage
        if: inputs.target == 'prod'
        run: |
          MERGE_BASE=$(git merge-base ${{ inputs.tag }} origin/main 2>/dev/null || true)
          TAG_COMMIT=$(git rev-parse ${{ inputs.tag }})
          if [ "$MERGE_BASE" != "$TAG_COMMIT" ]; then
            echo "Production redeployments must use a tag on the main branch lineage."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_USE_FIREBASE: ${{ vars.VITE_USE_FIREBASE }}
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ vars.S3_BUCKET }} --delete

      - name: Invalidate CloudFront
        if: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
